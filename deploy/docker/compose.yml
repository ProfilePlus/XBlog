services:
  postgres:
    image: ${XBLOG_POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  minio:
    image: ${XBLOG_MINIO_IMAGE}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - internal

  api:
    image: ${XBLOG_API_IMAGE}:${XBLOG_VERSION}
    env_file:
      - ./env/runtime.api.env
    environment:
      API_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN}
      WEB_ORIGIN: ${WEB_ORIGIN}
      API_BASE_URL: ${API_BASE_URL}
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL}
      OBJECT_STORAGE_S3_ENDPOINT: ${OBJECT_STORAGE_S3_ENDPOINT}
      OBJECT_STORAGE_S3_BUCKET: ${OBJECT_STORAGE_S3_BUCKET}
      OBJECT_STORAGE_S3_ACCESS_KEY_ID: ${OBJECT_STORAGE_S3_ACCESS_KEY_ID}
      OBJECT_STORAGE_S3_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_S3_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_S3_FORCE_PATH_STYLE: ${OBJECT_STORAGE_S3_FORCE_PATH_STYLE}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - internal

  web:
    image: ${XBLOG_WEB_IMAGE}:${XBLOG_VERSION}
    environment:
      XBLOG_API_URL: http://api:4000
    depends_on:
      - api
    networks:
      - internal

  admin:
    image: ${XBLOG_ADMIN_IMAGE}:${XBLOG_VERSION}
    environment:
      NEXT_PUBLIC_XBLOG_API_URL: ${API_BASE_URL}
    depends_on:
      - api
    networks:
      - internal

  caddy:
    image: ${XBLOG_CADDY_IMAGE}:${XBLOG_VERSION}
    ports:
      - "80:80"
      - "443:443"
    environment:
      XBLOG_ACME_EMAIL: ${XBLOG_ACME_EMAIL}
      XBLOG_BASE_DOMAIN: ${XBLOG_BASE_DOMAIN}
      XBLOG_ADMIN_BASIC_AUTH_USER: ${XBLOG_ADMIN_BASIC_AUTH_USER}
      XBLOG_ADMIN_BASIC_AUTH_HASH: ${XBLOG_ADMIN_BASIC_AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - admin
      - api
      - minio
    networks:
      - internal
      - public

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
